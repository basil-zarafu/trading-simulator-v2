<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Simulator V2 - Intraday</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .header { background: #16213e; padding: 15px 20px; border-bottom: 2px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; color: #e94560; }
        .chart-toggle { display: flex; gap: 10px; align-items: center; }
        .chart-toggle label { font-size: 12px; color: #888; }
        .toggle-btn { background: #0f3460; border: 1px solid #1a1a2e; color: #888; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .toggle-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
        .main-layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 70px); }
        .sidebar { background: #16213e; padding: 20px; overflow-y: auto; }
        .sidebar h2 { font-size: 14px; color: #e94560; margin-bottom: 15px; text-transform: uppercase; }
        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .control-group input, .control-group select { width: 100%; padding: 8px 10px; background: #0f3460; border: 1px solid #1a1a2e; border-radius: 6px; color: #fff; font-size: 13px; }
        .slider-container { display: flex; align-items: center; gap: 8px; }
        .slider-container input { flex: 1; }
        .slider-value { min-width: 45px; text-align: right; font-family: monospace; color: #e94560; font-size: 12px; }
        .btn { width: 100%; padding: 12px; background: #e94560; border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #ff6b6b; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .content-area { padding: 20px; display: grid; grid-template-rows: auto 1fr; gap: 20px; overflow-y: auto; }
        .top-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-card { background: #16213e; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 20px; font-weight: 600; color: #fff; }
        .stat-value.positive { color: #4ade80; }
        .stat-value.negative { color: #ef4444; }
        .pnl-breakdown { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .pnl-item { background: #0f3460; padding: 10px; border-radius: 6px; text-align: center; }
        .pnl-item .label { font-size: 9px; color: #888; text-transform: uppercase; }
        .pnl-item .value { font-size: 16px; font-weight: 600; margin-top: 3px; }
        .charts-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; min-height: 400px; }
        .chart-panel { background: #16213e; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .chart-panel h3 { font-size: 12px; color: #888; text-transform: uppercase; }
        .chart-container { flex: 1; position: relative; min-height: 300px; }
        .log-panel { background: #16213e; border-radius: 12px; padding: 15px; max-height: 500px; }
        .log-panel h3 { font-size: 12px; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        .log-container { max-height: 400px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.5; background: #0f3460; border-radius: 6px; padding: 10px; }
        .log-entry { padding: 3px 0; border-bottom: 1px solid #1a1a2e; }
        .log-entry.open { color: #4ade80; }
        .log-entry.close { color: #e94560; }
        @media (max-width: 1400px) { .main-layout { grid-template-columns: 280px 1fr; } .charts-section { grid-template-columns: 1fr; } }
        @media (max-width: 1000px) { .main-layout { grid-template-columns: 1fr; } .sidebar { position: static; } .top-section { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🛢️ Trading Simulator V2</h1>
            <p style="color: #888; font-size: 13px;">Intraday 10-Minute Resolution</p>
        </div>
        <div class="chart-toggle">
            <label>Price Chart:</label>
            <button class="toggle-btn active" id="lineBtn" onclick="setChartType('line')">Line</button>
            <button class="toggle-btn" id="candleBtn" onclick="setChartType('candle')">Candles</button>
        </div>
    </div>
    
    <div class="main-layout">
        <div class="sidebar">
            <h2>Configuration</h2>
            <div class="control-group">
                <label>Strategy</label>
                <select id="strategyType">
                    <option value="straddle" selected>1DTE Straddle</option>
                    <option value="long_protection">Long Protection (70DTE)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Days (Calendar)</label>
                <div class="slider-container">
                    <input type="range" id="simDays" min="10" max="365" value="30">
                    <span class="slider-value" id="simDaysValue">30</span>
                </div>
            </div>
            <div class="control-group">
                <label>Initial Price ($)</label>
                <input type="number" id="initialPrice" value="75.0" step="0.01">
            </div>
            <div class="control-group">
                <label>Volatility (%)</label>
                <div class="slider-container">
                    <input type="range" id="volatility" min="10" max="60" value="30">
                    <span class="slider-value" id="volatilityValue">30%</span>
                </div>
            </div>
            <div class="control-group">
                <label>VRP (%)</label>
                <div class="slider-container">
                    <input type="range" id="vrp" min="0" max="15" value="5">
                    <span class="slider-value" id="vrpValue">5%</span>
                </div>
            </div>
            <div class="control-group">
                <label>Seed</label>
                <input type="number" id="seed" value="42">
            </div>
            <button class="btn" id="runBtn" onclick="runSimulation()">▶ Run Simulation</button>
        </div>
        
        <div class="content-area">
            <div class="top-section">
                <div class="stat-card">
                    <div class="stat-label">Net P&L</div>
                    <div class="stat-value" id="netPnl">$0</div>
                    <div class="pnl-breakdown">
                        <div class="pnl-item"><div class="label">P&L/Day</div><div class="value" id="pnlPerDay">$0</div></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Positions</div>
                    <div class="stat-value" id="positionCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Win Rate</div>
                    <div class="stat-value" id="winRate">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Final Price</div>
                    <div class="stat-value" id="finalPrice">$0</div>
                </div>
            </div>
            
            <div class="charts-section">
                <div class="chart-panel">
                    <div class="chart-header"><h3>Price Chart</h3></div>
                    <div class="chart-container"><canvas id="priceChart"></canvas></div>
                </div>
                <div class="chart-panel">
                    <div class="chart-header"><h3>P&L Over Time</h3></div>
                    <div class="chart-container"><canvas id="pnlChart"></canvas></div>
                </div>
            </div>
            
            <div class="log-panel">
                <h3>Trade Log</h3>
                <div class="log-container" id="tradeLog"><div class="log-entry">Ready to run simulation...</div></div>
            </div>
        </div>
    </div>
    
    <script>
        // Slider updates
        document.getElementById('simDays').addEventListener('input', e => document.getElementById('simDaysValue').textContent = e.target.value);
        document.getElementById('volatility').addEventListener('input', e => document.getElementById('volatilityValue').textContent = e.target.value + '%');
        document.getElementById('vrp').addEventListener('input', e => document.getElementById('vrpValue').textContent = e.target.value + '%');
        
        let priceChart = null, pnlChart = null, currentChartType = 'line', lastData = null;
        
        function setChartType(type) {
            currentChartType = type;
            document.getElementById('lineBtn').classList.toggle('active', type === 'line');
            document.getElementById('candleBtn').classList.toggle('active', type === 'candle');
            if (lastData) updatePriceChart(lastData);
        }
        
        async function runSimulation() {
            const btn = document.getElementById('runBtn');
            btn.disabled = true; btn.textContent = '⏳';
            
            const res = await fetch('/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    days: parseInt(document.getElementById('simDays').value),
                    initial_price: parseFloat(document.getElementById('initialPrice').value),
                    volatility: parseInt(document.getElementById('volatility').value) / 100,
                    vrp: parseInt(document.getElementById('vrp').value) / 100,
                    seed: parseInt(document.getElementById('seed').value),
                    strategy: document.getElementById('strategyType').value
                })
            });
            const data = await res.json();
            displayResults(data);
            btn.disabled = false; btn.textContent = '▶ Run Simulation';
        }
        
        function displayResults(r) {
            lastData = r;
            const net = r.net_pnl || 0;
            document.getElementById('netPnl').textContent = (net >= 0 ? '+$' : '-$') + Math.abs(net).toLocaleString();
            document.getElementById('netPnl').className = 'stat-value ' + (net >= 0 ? 'positive' : 'negative');
            document.getElementById('positionCount').textContent = r.position_count || 0;
            document.getElementById('winRate').textContent = (r.win_rate || 0).toFixed(0) + '%';
            document.getElementById('finalPrice').textContent = '$' + (r.final_price || 0).toFixed(2);
            document.getElementById('pnlPerDay').textContent = '$' + ((r.total_pnl_per_day || 0)).toFixed(0);
            
            const log = document.getElementById('tradeLog');
            log.innerHTML = '';
            (r.trades || []).forEach(t => {
                const e = document.createElement('div');
                e.className = 'log-entry ' + t.trade_type;
                e.textContent = t.message;
                log.appendChild(e);
            });
            
            if (r.ohlc || r.price_points) {
                updatePriceChart(r);
            }
            if (r.trades) {
                updatePnlChart(r);
            }
        }
        
        function updatePriceChart(data) {
            if (priceChart) { priceChart.destroy(); priceChart = null; }
            
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (currentChartType === 'candle' && data.ohlc) {
                // Candlestick chart using daily OHLC
                const ohlc = data.ohlc;
                const labels = ohlc.map(d => 'D' + d.day);
                
                // Custom plugin to draw candles
                const candlePlugin = {
                    id: 'candles',
                    afterDatasetsDraw(chart) {
                        const ctx = chart.ctx;
                        const xScale = chart.scales.x;
                        const yScale = chart.scales.y;
                        
                        ohlc.forEach((d, i) => {
                            const x = xScale.getPixelForValue(i);
                            const width = Math.max(4, xScale.width / ohlc.length * 0.6);
                            const yOpen = yScale.getPixelForValue(d.open);
                            const yHigh = yScale.getPixelForValue(d.high);
                            const yLow = yScale.getPixelForValue(d.low);
                            const yClose = yScale.getPixelForValue(d.close);
                            
                            const isGreen = d.close >= d.open;
                            ctx.fillStyle = isGreen ? '#4ade80' : '#ef4444';
                            ctx.strokeStyle = isGreen ? '#4ade80' : '#ef4444';
                            
                            // Wick
                            ctx.beginPath();
                            ctx.moveTo(x, yHigh);
                            ctx.lineTo(x, yLow);
                            ctx.stroke();
                            
                            // Body
                            const top = Math.min(yOpen, yClose);
                            const height = Math.abs(yClose - yOpen);
                            ctx.fillRect(x - width/2, top, width, Math.max(1, height));
                        });
                    }
                };
                
                // Calculate price range for Y-axis (add some padding)
                const allPrices = ohlc.flatMap(d => [d.open, d.high, d.low, d.close]);
                const minPrice = Math.min(...allPrices) * 0.995;
                const maxPrice = Math.max(...allPrices) * 1.005;
                
                priceChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: ohlc.map(d => ({x: d.high, y: d.low})),
                            backgroundColor: 'transparent'
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#0f3460' } },
                            y: { 
                                min: minPrice,
                                max: maxPrice,
                                ticks: { color: '#888', callback: v => '$' + v.toFixed(2) }, 
                                grid: { color: '#0f3460' } 
                            }
                        }
                    },
                    plugins: [candlePlugin]
                });
            } else {
                // Line chart - sample 10-min data for performance
                const points = data.price_points || [];
                const sampleRate = Math.ceil(points.length / 200);
                const sampled = points.filter((_, i) => i % sampleRate === 0);
                
                priceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: sampled.map(p => 'D' + p.day),
                        datasets: [{
                            label: 'Price',
                            data: sampled.map(p => p.price),
                            borderColor: '#fbbf24',
                            backgroundColor: 'rgba(251,191,36,0.1)',
                            fill: true, tension: 0.2, borderWidth: 2, pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#0f3460' } },
                            y: { ticks: { color: '#888', callback: v => '$' + v }, grid: { color: '#0f3460' } }
                        }
                    }
                });
            }
        }
        
        function updatePnlChart(data) {
            if (pnlChart) { pnlChart.destroy(); pnlChart = null; }
            
            const trades = data.trades || [];
            const closeTrades = trades.filter(t => t.trade_type === 'close');
            
            if (closeTrades.length === 0) {
                console.log('No close trades found for P&L chart');
                return;
            }
            
            let cumulative = 0;
            const labels = [];
            const values = [];
            
            closeTrades.forEach((t, i) => {
                const pnl = t.pnl || 0;
                cumulative += pnl;
                labels.push('D' + t.day);
                values.push(cumulative);
                console.log(`Trade ${i}: day=${t.day}, pnl=${pnl}, cumulative=${cumulative}`);
            });
            
            console.log('P&L Chart Data:', { labels, values, closeTradesCount: closeTrades.length });
            
            pnlChart = new Chart(document.getElementById('pnlChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Cumulative P&L',
                        data: values,
                        borderColor: '#e94560',
                        backgroundColor: 'rgba(233,69,96,0.1)',
                        fill: true, tension: 0.3, borderWidth: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#0f3460' } },
                        y: { ticks: { color: '#888', callback: v => '$' + v }, grid: { color: '#0f3460' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
